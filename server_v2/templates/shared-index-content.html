<!DOCTYPE html>
<html lang="en" class="layer-space-container">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/polyclass@latest/dist/polyclass.browser-full.js"></script>
    <link rel="stylesheet" href="../static/css/index.css">
    <title>Cluster</title>
</head>

<body polyclass class='background-#222
                        color-#DDD
                        margin-0
                        layer-space-container
                        font-pack-lexend+deca-500
                        font-lexend+deca-500 letter-spacing-.1px'>

    <header class='primary background-#111'>
        <div class="logo padding-1em
                    font-size-1rem">Strangemother</div>
    </header>

    <div class="layer-space">
        <main>
            <header>
                <h1 class="title
                            text-align-center
                            font-size-2rem">
                    Graph
                </h1>
            </header>

            <div class="page-content">
                <p>Description.</p>
                <p>Each card below has a <code>data-graph-node</code> attribute so the demo stepper can toggle classes during execution.</p>
            </div>

            <div class="page-content">
                <section class="graph-demo widthed">
                    <div class="graph-demo-controls">
                        <button type="button" onclick="window.prepareDemoStepper()">Prepare Stepper</button>
                        <button type="button" onclick="window.stepDemoStepper()">Step</button>
                        <button type="button" onclick="window.resetDemoStepperView()">Reset View</button>
                        <button type="button" onclick="window.logDemoStepperState()">Log State</button>
                    </div>

                    <div class="graph-demo-grid">
                        <div class="graph-demo-node" data-graph-node="a">
                            <div class="graph-demo-node-name">a</div>
                            <div class="graph-demo-node-note">start</div>
                        </div>
                        <div class="graph-demo-node" data-graph-node="b">
                            <div class="graph-demo-node-name">b</div>
                            <div class="graph-demo-node-note">fan out</div>
                        </div>
                        <div class="graph-demo-node" data-graph-node="c">
                            <div class="graph-demo-node-name">c</div>
                            <div class="graph-demo-node-note">to e</div>
                        </div>
                        <div class="graph-demo-node" data-graph-node="d">
                            <div class="graph-demo-node-name">d</div>
                            <div class="graph-demo-node-note">to e</div>
                        </div>
                        <div class="graph-demo-node" data-graph-node="e">
                            <div class="graph-demo-node-name">e</div>
                            <div class="graph-demo-node-note">mergeNode</div>
                        </div>
                        <div class="graph-demo-node" data-graph-node="f">
                            <div class="graph-demo-node-name">f</div>
                            <div class="graph-demo-node-note">to h</div>
                        </div>
                        <div class="graph-demo-node" data-graph-node="g">
                            <div class="graph-demo-node-name">g</div>
                            <div class="graph-demo-node-note">to h</div>
                        </div>
                        <div class="graph-demo-node" data-graph-node="h">
                            <div class="graph-demo-node-name">h</div>
                            <div class="graph-demo-node-note">mergeNode</div>
                        </div>
                    </div>
                </section>
            </div>

        </main>
    </div>
    {% block js_scripts %}
    <script src="/static/js/src/graph-2.js"></script>
    <script src="/static/js/src/graph-stepper.js"></script>
    <script src="/static/js/index.js"></script>
    {% endblock %}

</body>
</html>
